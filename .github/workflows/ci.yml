name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy,rustfmt
      - name: Rustfmt
        run: cargo +nightly fmt --all -- --check
      - name: Clippy
        run: cargo +nightly clippy --workspace --lib --examples --tests --benches --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked
      - name: Run tests
        run: cargo test --workspace --all-targets --locked
      - name: Build release binary
        run: cargo build --release --locked --bin boom
      - name: Smoke test release binary (Unix)
        if: runner.os != 'Windows'
        run: ./target/release/boom --version
      - name: Smoke test release binary (Windows)
        if: runner.os == 'Windows'
        run: .\target\release\boom.exe --version

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Rustdoc warnings denied
        run: RUSTDOCFLAGS="-D warnings" cargo +nightly doc --workspace --no-deps --locked

  installers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Unix installer
        run: bash -n install.sh
      - name: Validate PowerShell installer
        shell: pwsh
        run: $null = [scriptblock]::Create((Get-Content -Raw install.ps1))

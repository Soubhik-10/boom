name: release

on:
  push:
    tags: ["v*"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      inactivity_hours:
        description: "Pause nightly/manual release when main has been inactive this long"
        required: false
        default: "24"
        type: string
      force:
        description: "Run even when main is outside the inactivity window"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  prepare:
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      release_tag: ${{ steps.gate.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
          fetch-depth: 0
      - name: Apply activity gate
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INACTIVITY_HOURS: ${{ inputs.inactivity_hours || '24' }}
          FORCE_RELEASE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail
          if ! [[ "${INACTIVITY_HOURS}" =~ ^[0-9]+$ ]]; then
            echo "inactivity_hours must be a non-negative integer" >&2
            exit 1
          fi
          if [[ "${EVENT_NAME}" == "push" ]]; then
            echo "should_release=true" >> "${GITHUB_OUTPUT}"
            echo "release_tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "Tag push: releasing ${GITHUB_REF_NAME}."
            exit 0
          fi

          latest_epoch="$(git log -1 --format=%ct origin/main 2>/dev/null || git log -1 --format=%ct)"
          now_epoch="$(date +%s)"
          age_seconds=$((now_epoch - latest_epoch))
          max_age_seconds=$((INACTIVITY_HOURS * 3600))
          age_hours=$((age_seconds / 3600))

          if [[ "${FORCE_RELEASE,,}" == "true" || "${age_seconds}" -le "${max_age_seconds}" ]]; then
            echo "should_release=true" >> "${GITHUB_OUTPUT}"
            echo "release_tag=nightly" >> "${GITHUB_OUTPUT}"
            echo "main activity is ${age_hours}h old; releasing nightly."
          else
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            echo "release_tag=nightly" >> "${GITHUB_OUTPUT}"
            echo "Pausing release: main has been inactive for ${age_hours}h (window: ${INACTIVITY_HOURS}h)."
          fi

  verify:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "boom") | .version')"
          test "${GITHUB_REF_NAME}" = "v${version}"
      - run: cargo test --workspace --all-targets --locked

  build:
    needs: [prepare, verify]
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: boom-linux-x86_64.tar.gz
            binary: boom
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: boom-linux-aarch64.tar.gz
            binary: boom
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: boom-windows-x86_64.zip
            binary: boom.exe
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: boom-macos-x86_64.tar.gz
            binary: boom
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: boom-macos-aarch64.tar.gz
            binary: boom
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin boom
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./target/${{ matrix.target }}/release/${{ matrix.binary }} --version
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.target }}\release\${{ matrix.binary }} --version
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" README.md LICENSE-MIT LICENSE-APACHE dist/package/
          tar -C dist/package -czf "dist/${{ matrix.asset }}" .
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}", README.md, LICENSE-MIT, LICENSE-APACHE dist/package/
          Compress-Archive -Path dist/package/* -DestinationPath "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum boom-* > SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG}" == "nightly" ]]; then
            if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              gh release upload "${RELEASE_TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
            else
              gh release create "${RELEASE_TAG}" dist/* --prerelease --generate-notes --title "Boom nightly" --repo "${GITHUB_REPOSITORY}"
            fi
          else
            gh release create "${RELEASE_TAG}" dist/* --verify-tag --generate-notes --title "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}"
          fi

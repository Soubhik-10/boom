<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Boom Anvil RPC benchmark snapshot</title>
  <desc id="desc">A benchmark dashboard showing 1,000 successful requests at 100 requests per second, with p50 latency 2.39 milliseconds, p95 latency 2.91 milliseconds, and p99 latency 3.30 milliseconds.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14233a"/>
      <stop offset="0.46" stop-color="#080c13"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <style>
      .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #eff6ff; }
      .muted { fill: #8fa2b7; }
      .label { fill: #b6c7db; font-size: 14px; }
      .small { fill: #8fa2b7; font-size: 12px; }
      .panel { fill: #0c121b; fill-opacity: .94; stroke: #1d3147; stroke-width: 1; }
      .grid { stroke: #20334a; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="18" fill="url(#bg)"/>
  <text x="52" y="62" class="text" font-size="32" font-weight="800">boom · Anvil RPC benchmark</text>
  <text x="52" y="90" class="muted" font-size="15">Foundry Anvil · 127.0.0.1:8545 · 21 configured methods · seed 42</text>
  <rect x="1005" y="43" width="143" height="36" rx="18" fill="#142235" stroke="#1f6feb"/>
  <text x="1076" y="67" class="text" font-size="13" text-anchor="middle" fill="#bfe4ff">0% errors</text>

  <g filter="url(#shadow)">
    <rect x="52" y="122" width="258" height="100" rx="10" class="panel"/>
    <rect x="330" y="122" width="258" height="100" rx="10" class="panel"/>
    <rect x="608" y="122" width="258" height="100" rx="10" class="panel"/>
    <rect x="886" y="122" width="262" height="100" rx="10" class="panel"/>
  </g>
  <text x="74" y="150" class="small">SUCCESSFUL REQUESTS</text>
  <text x="74" y="190" class="text" font-size="31" font-weight="800">1,000 / 1,000</text>
  <text x="352" y="150" class="small">THROUGHPUT</text>
  <text x="352" y="190" class="text" font-size="31" font-weight="800">100.00 <tspan font-size="15" class="muted">req/s</tspan></text>
  <text x="630" y="150" class="small">P95 LATENCY</text>
  <text x="630" y="190" class="text" font-size="31" font-weight="800">2.91 <tspan font-size="15" class="muted">ms</tspan></text>
  <text x="908" y="150" class="small">LOAD PROFILE</text>
  <text x="908" y="190" class="text" font-size="23" font-weight="800">8 × 4 batch</text>
  <text x="908" y="210" class="small">10s measured · 2s warmup</text>

  <rect x="52" y="250" width="540" height="458" rx="10" class="panel"/>
  <text x="78" y="286" class="text" font-size="18" font-weight="700">Latency quantiles</text>
  <text x="78" y="310" class="muted" font-size="13">Measured over 1,000 logical JSON-RPC requests</text>
  <line x1="120" y1="640" x2="552" y2="640" class="grid"/>
  <line x1="120" y1="560" x2="552" y2="560" class="grid"/>
  <line x1="120" y1="480" x2="552" y2="480" class="grid"/>
  <line x1="120" y1="400" x2="552" y2="400" class="grid"/>
  <line x1="120" y1="320" x2="552" y2="320" class="grid"/>
  <text x="104" y="645" class="small" text-anchor="end">0</text>
  <text x="104" y="565" class="small" text-anchor="end">1</text>
  <text x="104" y="485" class="small" text-anchor="end">2</text>
  <text x="104" y="405" class="small" text-anchor="end">3</text>
  <text x="104" y="325" class="small" text-anchor="end">4 ms</text>
  <rect x="176" y="449" width="82" height="191" rx="8" fill="#2f6fed"/>
  <rect x="300" y="407" width="82" height="233" rx="8" fill="url(#teal)"/>
  <rect x="424" y="376" width="82" height="264" rx="8" fill="#a78bfa"/>
  <text x="217" y="435" class="text" font-size="16" text-anchor="middle" font-weight="700">2.39 ms</text>
  <text x="341" y="393" class="text" font-size="16" text-anchor="middle" font-weight="700">2.91 ms</text>
  <text x="465" y="362" class="text" font-size="16" text-anchor="middle" font-weight="700">3.30 ms</text>
  <text x="217" y="670" class="label" text-anchor="middle">p50</text>
  <text x="341" y="670" class="label" text-anchor="middle">p95</text>
  <text x="465" y="670" class="label" text-anchor="middle">p99</text>
  <text x="217" y="692" class="small" text-anchor="middle">2,390,015 ns</text>
  <text x="341" y="692" class="small" text-anchor="middle">2,912,255 ns</text>
  <text x="465" y="692" class="small" text-anchor="middle">3,297,279 ns</text>

  <rect x="608" y="250" width="540" height="458" rx="10" class="panel"/>
  <text x="634" y="286" class="text" font-size="18" font-weight="700">Request volume by method</text>
  <text x="634" y="310" class="muted" font-size="13">Top six methods from the weighted Anvil workload</text>
  <text x="634" y="362" class="label">eth_getBlockByNumber</text>
  <rect x="634" y="374" width="350" height="20" rx="6" fill="#2f6fed"/><text x="1000" y="390" class="label">137</text>
  <text x="634" y="424" class="label">eth_blockNumber</text>
  <rect x="634" y="436" width="207" height="20" rx="6" fill="#2f6fed"/><text x="857" y="452" class="label">81</text>
  <text x="634" y="486" class="label">eth_getTransactionByHash</text>
  <rect x="634" y="498" width="207" height="20" rx="6" fill="#2f6fed"/><text x="857" y="514" class="label">81</text>
  <text x="634" y="548" class="label">eth_getBalance</text>
  <rect x="634" y="560" width="194" height="20" rx="6" fill="#38bdf8"/><text x="844" y="576" class="label">76</text>
  <text x="634" y="610" class="label">eth_getTransactionReceipt</text>
  <rect x="634" y="622" width="186" height="20" rx="6" fill="#38bdf8"/><text x="836" y="638" class="label">73</text>
  <text x="634" y="672" class="label">eth_call</text>
  <rect x="634" y="684" width="158" height="20" rx="6" fill="#38bdf8"/><text x="808" y="700" class="label">62</text>
</svg>
